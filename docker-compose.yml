services:
  enver:
    image: ${IMAGE_REPO}:${IMAGE_TAG:-latest}
    container_name: enver
    restart: unless-stopped
    env_file: .env
    environment:
      APP_BUILD_SHA: ${IMAGE_TAG:-latest}
      UPLOADS_DIR: /data/uploads
    volumes:
      - enver-uploads:/data/uploads
    networks:
      - enver-net

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - enver-net
    depends_on:
      - enver

networks:
  enver-net:

volumes:
  enver-uploads:
  caddy-data:
  caddy-config:
