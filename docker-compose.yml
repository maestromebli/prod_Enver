services:
  enver:
    image: ${IMAGE_REPO}:${IMAGE_TAG:-latest}
    container_name: enver
    restart: unless-stopped
    env_file: .env
    environment:
      APP_BUILD_SHA: ${IMAGE_TAG:-latest}
      SMB_HOST: ${SMB_HOST:-192.168.1.203}
      KDT_LOG_MOUNT: ${KDT_LOG_MOUNT:-/mnt/kdtsaw}
      ENVER_LOG_MOUNT: ${ENVER_LOG_MOUNT:-/mnt/enver-log}
    volumes:
      - ${KDT_LOG_MOUNT:-/mnt/kdtsaw}:${KDT_LOG_MOUNT:-/mnt/kdtsaw}:ro
      - ${ENVER_LOG_MOUNT:-/mnt/enver-log}:${ENVER_LOG_MOUNT:-/mnt/enver-log}:ro
    networks:
      - enver-net

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - enver-net
    depends_on:
      - enver

networks:
  enver-net:

volumes:
  caddy-data:
  caddy-config:
