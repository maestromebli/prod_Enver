<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ENVER Оператор" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#245c3b" />
    <title>ENVER — Панель оператора</title>
    <link rel="manifest" href="/manifest-operator.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <script src="/theme-init.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/icons/icon-192.png" />
  </head>
  <body class="enver-operator-ui operator-client-mode">
    <a class="skip-link" href="#content">Перейти до вмісту</a>
    <div class="loading-overlay" id="loadingOverlay" aria-live="polite">
      <div class="enver-loading-inner">
        <div class="enver-loading-skeletons" aria-hidden="true">
          <div class="enver-skeleton enver-skeleton-card"></div>
        </div>
        <p class="enver-loading-text">Завантаження…</p>
      </div>
    </div>

    <div class="modal-backdrop login-modal" id="loginModal" aria-hidden="true">
      <div class="modal login-card" role="dialog" aria-labelledby="loginTitle">
        <header class="login-hero">
          <span class="enver-brand enver-brand--hero" role="img" aria-label="ENVER">
            <img
              class="enver-brand__img"
              src="/brand/enver-logo-light.png"
              alt=""
              decoding="async"
            />
          </span>
          <p class="login-hero-tagline">Панель оператора · планшет / станок</p>
        </header>
        <form id="loginForm" class="login-form" novalidate>
          <div class="login-form-body">
            <h2 class="login-title" id="loginTitle">Вхід оператора</h2>
            <p class="login-subtitle">Логін і пароль, видані адміністратором</p>
            <p class="login-form-error" id="loginFormError" role="alert"></p>
            <div class="login-field">
              <label for="loginInput">Логін</label>
              <input
                id="loginInput"
                name="login"
                type="text"
                required
                autocomplete="username"
                autocapitalize="none"
              />
            </div>
            <div class="login-field">
              <label for="loginPassword">Пароль</label>
              <input
                id="loginPassword"
                name="password"
                type="password"
                required
                autocomplete="current-password"
              />
            </div>
          </div>
          <div class="login-form-footer">
            <button type="submit" class="btn btn-primary login-submit" id="loginSubmitBtn">
              <span id="loginSubmitText">Увійти</span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <div class="operator-client-shell" id="appRoot" hidden>
      <header class="operator-client-header">
        <span
          class="enver-brand enver-brand--header enver-brand--switch"
          role="img"
          aria-label="ENVER"
        >
          <img
            class="enver-brand__img enver-brand__img--dark"
            src="/brand/enver-logo-dark.png"
            alt=""
            decoding="async"
          />
          <img
            class="enver-brand__img enver-brand__img--light"
            src="/brand/enver-logo-light.png"
            alt=""
            decoding="async"
          />
        </span>
        <span class="operator-client-stage" id="operatorStageChip"></span>
        <div class="operator-header-spacer" aria-hidden="true"></div>
        <button
          type="button"
          class="btn btn-sm operator-header-primary operator-client-scan-btn op-btn-scan"
          id="operatorClientScanBtn"
          hidden
          title="Сканування деталі"
        >
          <span class="op-scan-glyph" aria-hidden="true"
            ><svg
              class="enver-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              aria-hidden="true"
            >
              <path d="M3 5v14" />
              <path d="M8 5v14" />
              <path d="M12 5v14" />
              <path d="M17 5v14" />
              <path d="M21 5v14" /></svg></span
          ><span class="op-scan-label">Сканувати</span>
        </button>
        <div class="operator-header-overflow">
          <button
            type="button"
            class="btn btn-sm btn-header-action operator-header-menu-btn"
            id="operatorHeaderMenuBtn"
            aria-expanded="false"
            aria-haspopup="menu"
            aria-controls="operatorHeaderMenu"
            aria-label="Меню оператора"
          >
            ⋯
          </button>
          <div class="operator-header-menu" id="operatorHeaderMenu" role="menu" hidden>
            <span class="operator-header-menu-user" id="userChip" role="presentation"></span>
            <span
              class="operator-client-build operator-header-menu-build"
              id="operatorBuildChip"
              hidden
            ></span>
            <button
              type="button"
              class="operator-header-menu-item"
              id="operatorClientBackBtn"
              role="menuitem"
              hidden
            >
              ← Назад
            </button>
            <button
              type="button"
              class="operator-header-menu-item"
              id="logoutBtn"
              role="menuitem"
              hidden
            >
              Вийти
            </button>
            <button
              type="button"
              class="operator-header-menu-item operator-kiosk-restore"
              id="kioskRestoreBtn"
              role="menuitem"
              hidden
            >
              Повноекранний режим
            </button>
            <button
              type="button"
              class="operator-header-menu-item operator-kiosk-exit"
              id="kioskExitBtn"
              role="menuitem"
              hidden
            >
              Вийти з киоску
            </button>
          </div>
        </div>
      </header>
      <main id="content" class="operator-client-content" aria-label="Основний вміст"></main>
    </div>

    <div class="modal-backdrop kiosk-password-modal" id="kioskPasswordModal" aria-hidden="true">
      <div class="modal kiosk-password-card" role="dialog" aria-labelledby="kioskPasswordTitle">
        <h2 id="kioskPasswordTitle">Вихід з повноекранного</h2>
        <p class="login-subtitle">Введіть пароль для розблокування</p>
        <form id="kioskPasswordForm" class="login-form" novalidate>
          <p class="login-form-error" id="kioskPasswordError" role="alert"></p>
          <div class="login-field">
            <label for="kioskPasswordInput">Пароль</label>
            <input id="kioskPasswordInput" type="password" inputmode="numeric" autocomplete="off" />
          </div>
          <div class="login-form-footer kiosk-password-actions">
            <button type="button" class="btn" id="kioskPasswordCancel">Скасувати</button>
            <button type="submit" class="btn btn-primary">Підтвердити</button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="/src/operator-app.js"></script>
  </body>
</html>
