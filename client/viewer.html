<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#121a24" />
    <title>ENVER — 3D перегляд</title>
    <script src="/theme-init.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/icons/icon-192.png" />
  </head>
  <body class="enver-viewer-window">
    <header class="viewer-window-header">
      <div class="viewer-window-title-wrap">
        <span class="enver-brand enver-brand--header" role="img" aria-label="ENVER">
          <img
            class="enver-brand__img enver-brand__img--dark"
            src="/brand/enver-logo-dark.png"
            alt=""
          />
          <img
            class="enver-brand__img enver-brand__img--light"
            src="/brand/enver-logo-light.png"
            alt=""
          />
        </span>
        <h1 class="viewer-window-title" id="viewerTitle">3D модель</h1>
      </div>
      <div class="viewer-window-toolbar" id="viewerToolbar" hidden>
        <button type="button" class="btn btn-sm is-active" data-viewer-action="ghost">
          На виробі
        </button>
        <button type="button" class="btn btn-sm" data-viewer-action="detail">Деталь</button>
        <button
          type="button"
          class="btn btn-sm viewer-toolbar-tablet"
          data-viewer-action="camera-bottom"
        >
          Знизу
        </button>
        <button type="button" class="btn btn-sm viewer-toolbar-tablet" data-viewer-action="drawing">
          Креслення
        </button>
        <button
          type="button"
          class="btn btn-sm viewer-toolbar-tablet"
          data-viewer-action="parts-panel"
        >
          Деталі
        </button>
        <button
          type="button"
          class="btn btn-sm viewer-toolbar-advanced"
          data-viewer-action="isolate"
        >
          Тільки деталь
        </button>
        <button type="button" class="btn btn-sm viewer-toolbar-advanced" data-viewer-action="all">
          Весь виріб
        </button>
        <button
          type="button"
          class="btn btn-sm viewer-toolbar-advanced"
          data-viewer-action="section"
        >
          Розріз
        </button>
        <button
          type="button"
          class="btn btn-sm viewer-toolbar-advanced"
          data-viewer-action="measure"
        >
          Вимір
        </button>
        <button
          type="button"
          class="btn btn-sm viewer-toolbar-advanced"
          data-viewer-action="wireframe"
        >
          Каркас
        </button>
        <button type="button" class="btn btn-sm viewer-toolbar-advanced" data-viewer-action="axes">
          Осі
        </button>
        <button type="button" class="btn btn-sm" data-viewer-action="fit">Вмістити</button>
        <button type="button" class="btn btn-sm" data-viewer-action="reset">Огляд</button>
        <button
          type="button"
          class="btn btn-sm viewer-toolbar-advanced"
          data-viewer-action="fullscreen"
        >
          На весь екран
        </button>
      </div>
      <button type="button" class="btn btn-sm viewer-window-close" id="viewerCloseBtn">
        Закрити
      </button>
    </header>
    <div class="viewer-window-body" id="viewerBody">
      <div id="viewerUpgradeBanner" hidden></div>
      <main class="viewer-window-main" id="viewerMount" aria-label="3D збірка">
        <p class="viewer-window-loading enver-meta" id="viewerLoading">Завантаження…</p>
      </main>
      <aside class="viewer-sidebar" id="viewerSidebar" hidden>
        <p class="viewer-sidebar-assembly-hint enver-meta">
          Зверху — 3D виробу · нижче — обрана деталь
        </p>
        <h2 class="viewer-sidebar-title">Обрана деталь</h2>
        <div
          id="viewerPartDetailMount"
          class="viewer-part-detail-mount part-viewer-3d"
          hidden
          aria-label="3D деталі"
        ></div>
        <dl class="viewer-meta-list" id="viewerMeta"></dl>
        <div id="viewerHoles" class="viewer-holes-wrap" hidden></div>
        <div id="viewerPartsPanel" class="viewer-parts-panel" hidden></div>
        <p class="viewer-hotkeys-hint enver-meta">
          Обертання — перетягування · Масштаб — колесо · <kbd>G</kbd> на виробі ·
          <kbd>D</kbd> деталь · <kbd>R</kbd> огляд · <kbd>F</kbd> вмістити · <kbd>M</kbd> вимір ·
          <kbd>X</kbd> розріз
        </p>
      </aside>
    </div>
    <p class="viewer-window-error form-error visible" id="viewerError" hidden></p>
    <script type="module" src="/src/viewer-app.js"></script>
  </body>
</html>
