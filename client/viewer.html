<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#121a24" />
    <title>ENVER — 3D перегляд</title>
    <script src="/theme-init.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/icons/icon-192.png" />
  </head>
  <body class="enver-viewer-window">
    <header class="viewer-window-header">
      <div class="viewer-window-title-wrap">
        <span class="enver-brand enver-brand--header" role="img" aria-label="ENVER">
          <img
            class="enver-brand__img enver-brand__img--dark"
            src="/brand/enver-logo-dark.png"
            alt=""
          />
          <img
            class="enver-brand__img enver-brand__img--light"
            src="/brand/enver-logo-light.png"
            alt=""
          />
        </span>
        <h1 class="viewer-window-title" id="viewerTitle">3D модель</h1>
      </div>
      <div class="viewer-window-toolbar" id="viewerToolbar" hidden>
        <button type="button" class="btn btn-sm is-active" data-viewer-action="detail">
          Деталь
        </button>
        <button type="button" class="btn btn-sm" data-viewer-action="ghost">Контекст</button>
        <button type="button" class="btn btn-sm" data-viewer-action="isolate">Тільки деталь</button>
        <button type="button" class="btn btn-sm" data-viewer-action="all">Весь виріб</button>
        <button type="button" class="btn btn-sm" data-viewer-action="section">Розріз</button>
        <button type="button" class="btn btn-sm" data-viewer-action="measure">Вимір</button>
        <button type="button" class="btn btn-sm" data-viewer-action="wireframe">Каркас</button>
        <button type="button" class="btn btn-sm" data-viewer-action="axes">Осі</button>
        <button type="button" class="btn btn-sm" data-viewer-action="fit">Вмістити</button>
        <button type="button" class="btn btn-sm" data-viewer-action="reset">Камера</button>
        <button type="button" class="btn btn-sm" data-viewer-action="fullscreen">
          На весь екран
        </button>
      </div>
      <button type="button" class="btn btn-sm viewer-window-close" id="viewerCloseBtn">
        Закрити
      </button>
    </header>
    <div class="viewer-window-body">
      <aside class="viewer-sidebar" id="viewerSidebar" hidden>
        <h2 class="viewer-sidebar-title">Деталь</h2>
        <dl class="viewer-meta-list" id="viewerMeta"></dl>
        <div id="viewerHoles" class="viewer-holes-wrap" hidden></div>
        <p class="viewer-hotkeys-hint enver-meta">
          Обертання — перетягування · Масштаб — колесо · <kbd>D</kbd> деталь · <kbd>G</kbd> контекст
          · <kbd>R</kbd> камера · <kbd>F</kbd> вмістити · <kbd>M</kbd> вимір · <kbd>X</kbd> розріз
        </p>
      </aside>
      <main class="viewer-window-main" id="viewerMount" aria-label="3D перегляд">
        <p class="viewer-window-loading enver-meta" id="viewerLoading">Завантаження…</p>
      </main>
    </div>
    <p class="viewer-window-error form-error visible" id="viewerError" hidden></p>
    <script type="module" src="/src/viewer-app.js"></script>
  </body>
</html>
