name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  IMAGE_REPO: ghcr.io/${{ github.repository }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            client/package-lock.json

      - name: Install
        run: npm run install:all

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: B3D converter (Bazis .b3d)
        run: |
          pip install -e "./tools/b3d-converter[dev]"
          cd tools/b3d-converter && pytest -q

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Coverage (unit, без БД)
        run: npm run test:coverage:check
        env:
          COVERAGE_SCOPE: shared
          # GitHub Actions дає ~91% при тих самих тестах (локально/Docker 95%+); поріг узгоджено з CI.
          COVERAGE_MIN_LINES: "90"

  e2e:
    needs: validate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: enver_dev
          POSTGRES_DB: enver
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d enver"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            client/package-lock.json

      - name: Install
        run: npm run install:all

      - name: Migrate (integration DB)
        env:
          DATABASE_URL: postgresql://postgres:enver_dev@localhost:5432/enver
          DATABASE_URL_MIGRATIONS: postgresql://postgres:enver_dev@localhost:5432/enver
        run: npm run migrate --prefix server

      - name: Integration tests + coverage
        env:
          CI: true
          RUN_INTEGRATION_TESTS: "1"
          CI_INTEGRATION_MIGRATED: "1"
          DATABASE_URL: postgresql://postgres:enver_dev@localhost:5432/enver
          DATABASE_URL_MIGRATIONS: postgresql://postgres:enver_dev@localhost:5432/enver
          COVERAGE_SCOPE: all
          COVERAGE_MIN_LINES_ALL: "48"
        run: npm run test:coverage:check

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E smoke
        env:
          CI: true
          DATABASE_URL: postgresql://postgres:enver_dev@localhost:5432/enver
          DATABASE_URL_MIGRATIONS: postgresql://postgres:enver_dev@localhost:5432/enver
        run: npm run test:e2e

  build-android:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          sed -i "s/versionCode = [0-9]*/versionCode = ${{ github.run_number }}/" desktop/android/app/build.gradle.kts
          cd desktop/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          node scripts/copy-release.mjs

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: releases/enver-operator-android.apk

  build:
    needs: [validate, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: releases

      - name: Verify APK in build context
        run: ls -la releases/

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo
        id: repo
        run: echo "name=${IMAGE_REPO,,}" >> "$GITHUB_OUTPUT"

      - name: Build (PR — без push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: enver:ci
          build-args: |
            APP_BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke Docker (PR)
        if: github.event_name == 'pull_request'
        run: |
          docker run -d --name enver-smoke -p 13000:3000 \
            -e NODE_ENV=development \
            -e UPLOADS_DIR=/tmp/enver-uploads \
            enver:ci
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:13000/api/health | grep -q '"ok":true'; then
              docker rm -f enver-smoke
              exit 0
            fi
            sleep 2
          done
          docker logs enver-smoke
          docker rm -f enver-smoke
          exit 1

      - name: Build & push (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          load: true
          tags: |
            ${{ steps.repo.outputs.name }}:latest
            ${{ steps.repo.outputs.name }}:${{ github.sha }}
          build-args: |
            APP_BUILD_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke Docker (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMAGE="${{ steps.repo.outputs.name }}:${{ github.sha }}"
          docker run --rm \
            -e NODE_ENV=production \
            -e SESSION_SECRET=ci-production-smoke-secret \
            -e DATABASE_URL=postgresql://ci:ci@127.0.0.1:9/ci \
            -e UPLOADS_DIR=/tmp/enver-uploads \
            "$IMAGE" node -e "
              import { assertProductionSafety } from './server/src/config.js';
              assertProductionSafety();
              console.log('production safety ok');
            "
          docker run -d --name enver-smoke-main -p 13001:3000 \
            -e NODE_ENV=development \
            -e UPLOADS_DIR=/tmp/enver-uploads \
            "$IMAGE"
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:13001/api/health | grep -q '"ok":true'; then
              docker rm -f enver-smoke-main
              exit 0
            fi
            sleep 2
          done
          docker logs enver-smoke-main
          docker rm -f enver-smoke-main
          exit 1

  migrate:
    needs: [build, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server deps
        run: npm ci --prefix server

      - name: Apply migrations
        env:
          DATABASE_URL_MIGRATIONS: ${{ secrets.DATABASE_URL_MIGRATIONS }}
        run: npm run migrate --prefix server

  deploy:
    needs: migrate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Lowercase repo
        id: repo
        run: echo "name=${IMAGE_REPO,,}" >> "$GITHUB_OUTPUT"

      - name: Sync compose files
        run: |
          scp docker-compose.yml deploy/Caddyfile scripts/deploy.sh \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/enver/

      - name: Deploy
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "bash /opt/enver/deploy.sh '${{ steps.repo.outputs.name }}' '${{ github.sha }}'"
